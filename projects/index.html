<!DOCTYPE html>
<html data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
<link rel="stylesheet" href="/shared/css/tokens.css">
<link rel="stylesheet" href="/projects/css/projects.css">
</head>
<body>

<!-- Impersonation banner -->
<div class="impersonation-banner" id="impersonation-banner">
  <span>Viewing as <strong id="impersonation-email"></strong></span>
  <button class="btn-return" onclick="returnToAdmin()">← Return to my account</button>
</div>

<!-- Topbar -->
<div id="topbar"></div>

<!-- App -->
<div class="app" id="app-wrap" style="display:none">

  <!-- Main layout -->
  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-main">
        <div class="sidebar-active">
          <div class="sidebar-label">Active</div>
          <div id="project-list"></div>
        </div>
        <div class="sidebar-completed">
          <div class="sidebar-label">Completed</div>
          <div id="completed-list"></div>
        </div>
        <div class="sidebar-footer">
          <div class="sidebar-footer-btns">
            <button class="btn btn-sm btn-primary" style="flex:1;justify-content:center" onclick="openAddProjectModal()">+ Add project</button>
          </div>
        </div>
      </div>
      <div class="sidebar-resize-handle" id="sidebar-resize"></div>
    </div>

    <!-- Content -->
    <div class="content" id="content"></div>
  </div>

</div><!-- end #app-wrap -->

<!-- Modal container -->
<div id="modal-container"></div>

<script src="/shared/js/supabase-client.js"></script>
<script src="/shared/js/banner.js"></script>
<script src="/shared/js/module-header.js"></script>
<script src="/projects/js/state.js"></script>
<script src="/projects/js/render.js"></script>
<script src="/projects/js/modals.js"></script>
<script src="/projects/js/app.js"></script>
</body>
</html>
