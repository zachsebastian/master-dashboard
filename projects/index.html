<!DOCTYPE html>
<html data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
<link rel="stylesheet" href="/shared/css/tokens.css">
<link rel="stylesheet" href="/projects/css/projects.css">
</head>
<body>

<!-- Impersonation banner -->
<div class="impersonation-banner" id="impersonation-banner">
  <span>Viewing as <strong id="impersonation-email"></strong></span>
  <button class="btn-return" onclick="returnToAdmin()">← Return to my account</button>
</div>

<!-- App -->
<div class="app" id="app-wrap" style="display:none">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="/" style="font-size:12px;color:var(--text-3);text-decoration:none;white-space:nowrap;transition:color 0.1s;margin-right:2px" onmouseover="this.style.color='var(--text-2)'" onmouseout="this.style.color='var(--text-3)'">← Home</a>
      <div style="display:flex;flex-direction:column;gap:2px">
        <div class="brand-name">Project Tracker</div>
        <button class="sidebar-toggle-btn" onclick="toggleSidebar()" id="sidebar-toggle-btn">hide sidebar</button>
      </div>
    </div>
    <div id="save-wrap" class="save-wrap">
      <div class="save-dot"></div>
      <div class="save-label">Saved</div>
    </div>
    <div class="topbar-right">
      <div class="view-tabs">
        <button class="view-tab active" id="tab-summary" onclick="setView('summary')">Summary</button>
        <button class="view-tab" id="tab-detail" onclick="setView('detail')">Detail</button>
      </div>
      <div class="dropdown-wrap" id="menu-wrap">
        <button class="btn" onclick="toggleMenu()">⋯ More</button>
        <div class="dropdown-menu" id="dropdown-menu" style="display:none">
          <button class="dropdown-item" onclick="exportData(); closeMenu()">📤 Export JSON</button>
          <button class="dropdown-item" onclick="importClick(); closeMenu()">📥 Import JSON</button>
        </div>
      </div>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
      <div class="theme-toggle" onclick="toggleTheme()">
        <div class="theme-track" id="theme-track"><div class="theme-thumb"></div></div>
        <span id="theme-label">Light</span>
      </div>
      <button class="btn" onclick="signOut()">Sign Out</button>
    </div>
  </div>

  <!-- Main layout -->
  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-main">
        <div class="sidebar-active">
          <div class="sidebar-label">Active</div>
          <div id="project-list"></div>
        </div>
        <div class="sidebar-completed">
          <div class="sidebar-label">Completed</div>
          <div id="completed-list"></div>
        </div>
        <div class="sidebar-footer">
          <div class="sidebar-footer-btns">
            <button class="btn btn-sm btn-primary" style="flex:1;justify-content:center" onclick="openAddProjectModal()">+ Add project</button>
          </div>
        </div>
      </div>
      <div class="sidebar-resize-handle" id="sidebar-resize"></div>
    </div>

    <!-- Content -->
    <div class="content" id="content"></div>
  </div>

</div><!-- end #app-wrap -->

<!-- Modal container -->
<div id="modal-container"></div>

<script src="/shared/js/supabase-client.js"></script>
<script src="/shared/js/banner.js"></script>
<script src="/projects/js/state.js"></script>
<script src="/projects/js/render.js"></script>
<script src="/projects/js/modals.js"></script>
<script src="/projects/js/app.js"></script>
</body>
</html>
