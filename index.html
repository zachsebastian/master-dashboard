<!DOCTYPE html>
<html data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Suite</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
<link rel="stylesheet" href="/shared/css/tokens.css">
<link rel="stylesheet" href="/dashboard/css/dashboard.css">
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loading-screen"><div class="spinner"></div></div>

<!-- Profile completion -->
<div class="profile-screen" id="profile-screen" style="display:none">
  <div class="profile-card">
    <div class="auth-title">Complete your profile</div>
    <div class="auth-subtitle" style="margin-bottom:28px">Just a couple of details before you get started.</div>
    <div class="auth-error" id="profile-error"></div>
    <div class="profile-name-row">
      <div>
        <label class="form-label">First Name</label>
        <input class="form-input" type="text" id="profile-first-name" placeholder="Jane"
          onkeydown="if(event.key==='Enter')document.getElementById('profile-last-name').focus()" autofocus>
      </div>
      <div>
        <label class="form-label">Last Name</label>
        <input class="form-input" type="text" id="profile-last-name" placeholder="Smith"
          onkeydown="if(event.key==='Enter')saveProfile()">
      </div>
    </div>
    <div style="margin-top:14px"></div>
    <button class="btn-primary" id="profile-save-btn" onclick="saveProfile()">Save & Continue</button>
  </div>
</div>

<!-- Auth -->
<div class="auth-screen" id="auth-screen" style="display:none">
  <div class="auth-card">
    <div class="auth-title">Dashboard Suite</div>
    <div class="auth-subtitle">Sign in to access your tools.</div>
    <div class="auth-error" id="auth-error"></div>
    <label class="form-label">Email</label>
    <input class="form-input" type="email" id="login-email" placeholder="you@example.com"
      onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()" autofocus>
    <label class="form-label">Password</label>
    <input class="form-input" type="password" id="login-password" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')signIn()">
    <button class="btn-primary" id="signin-btn" onclick="signIn()">Sign in</button>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">

  <div class="topbar">
    <div class="topbar-left">
      <div class="brand-name">Dashboard <span>Suite</span></div>
    </div>
    <div class="topbar-right">
      <div class="theme-toggle" onclick="toggleTheme(currentUser?.id)">
        <div class="theme-track" id="theme-track"><div class="theme-thumb"></div></div>
        <span id="theme-label">Light</span>
      </div>
      <span id="user-display-name" style="font-size:13px;color:var(--text-2);font-weight:500"></span>
      <button class="btn-sm" id="admin-btn" onclick="showAdminPage()" style="display:none">Admin</button>
      <button class="btn-sm" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <!-- Impersonation banner (sticky, below topbar) -->
  <div class="dash-impersonation-banner" id="impersonation-banner">
    <span>Viewing as <strong id="impersonation-email"></strong></span>
    <button class="btn-return" onclick="returnToAdmin()">← Return to My Account</button>
    <div></div>
  </div>

  <!-- Main dashboard view -->
  <div class="main" id="main-view">
    <div class="page-title" id="page-title">Your tools</div>
    <div class="page-subtitle" id="page-subtitle">Select a module to open it.</div>
    <div class="module-grid" id="module-grid"></div>
  </div>

  <!-- Admin full-page view -->
  <div id="admin-page" style="display:none">
    <div class="main">
      <button class="btn-sm" onclick="showMainPage()" style="margin-bottom:28px">← Dashboard</button>
      <div class="page-title">Admin</div>
      <div class="page-subtitle" style="margin-bottom:36px">Manage user access and permissions.</div>
      <div id="admin-page-content"></div>
    </div>
  </div>

</div>

<script src="/shared/js/supabase-client.js"></script>
<script src="/shared/js/theme.js"></script>
<script src="/shared/js/auth.js"></script>
<script src="/dashboard/js/modules.js"></script>
<script src="/dashboard/js/admin.js"></script>
<script src="/dashboard/js/app.js"></script>
</body>
</html>
